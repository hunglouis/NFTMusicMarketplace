name: CI/CD cơ bản cho cá nhân

# 1. Kích hoạt pipeline khi có sự kiện push hoặc pull_request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # 2. Khởi tạo môi trường chạy (Runner) ảo của GitHub
    runs-on: ubuntu-latest

    steps:
    # Step 1: Tải mã nguồn từ kho lưu trữ xuống máy ảo
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Thiết lập môi trường (Ví dụ này dùng Node.js, bạn có thể đổi sang Python, Java...)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # Tự động cache các thư viện để chạy nhanh hơn ở lần sau

    # Step 3: Cài đặt các thư viện phụ thuộc (dependencies)
    - name: Install dependencies
      run: npm ci

    # Step 4: Chạy kiểm tra lỗi cú pháp (Lint) và kiểm thử (Test)
    - name: Run Lint
      run: npm run lint --if-present

    - name: Run Tests
      run: npm run test --if-present
